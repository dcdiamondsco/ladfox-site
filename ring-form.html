<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Engagement Ring Design Form | Ladfox</title>
  <meta name="description" content="Share your engagement ring preferences in a calm, guided form. Shape, style, metal, and lab grown or Natural options."/>
  <link rel="canonical" href="https://ladfox.com/ring-form.html" />
  <link rel="icon" type="image/png" sizes="1024x1024" href="/Images/Logo%20Inverted.png" />
  <link rel="apple-touch-icon" href="/Images/Logo%20Inverted.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <meta property="og:type" content="website"/>
  <meta property="og:title" content="Engagement Ring Design Form | Ladfox"/>
  <meta property="og:description" content="A calm, guided form to capture engagement ring preferences, style, and stone choices."/>
  <meta property="og:url" content="https://ladfox.com/ring-form.html"/>
  <meta property="og:image" content="https://ladfox.com/Images/petal%20prong.png"/>

  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Engagement Ring Design Form | Ladfox"/>
  <meta name="twitter:description" content="Capture engagement ring preferences with a calm, guided form."/>
  <meta name="twitter:image" content="https://ladfox.com/Images/petal%20prong.png"/>
  <link rel="stylesheet" href="scroll-reveal.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@500;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ringVW: 8vw;
      --ringMax: 110px;
      --bg:#050505;
      --surface:rgba(12,12,12,.9);
      --surface-strong:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.14);
      --line-strong:rgba(255,255,255,.24);
      --text:#ffffff;
      --muted:rgba(255,255,255,.68);
      --accent:#f5f5f5;
      --accent-strong:#ffffff;
      --heading:"Syne", sans-serif;
      --body:"Manrope", sans-serif;
      --shadow:0 34px 90px rgba(0,0,0,.44);
    }
    html, body { min-height: 100svh; overflow-x: hidden; }
    html{
      background:#000;
      overscroll-behavior-y:none;
    }
    @supports not (height: 100svh) { html, body { min-height: 100dvh; } }
    body {
      font-family: var(--body);
      margin: 0;
      min-height:100svh;
      background-color:#000;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.08), transparent 30%),
        radial-gradient(circle at 20% 80%, rgba(255,255,255,.06), transparent 28%),
        linear-gradient(180deg, #090909 0%, #020202 52%, #000 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      position:relative;
      isolation:isolate;
    }

    @supports (min-height: 100dvh){
      body{
        min-height:100dvh;
      }
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:#000;
      pointer-events:none;
      z-index:0;
    }

    body.custom-select-open{
      overflow:hidden;
    }

    .form-section {
      flex: 1;
      min-height: calc(100svh - 96px);
      display: grid;
      place-items: center;
      padding: 40px 24px 30px;
      position: relative;
      z-index:1;
    }

    .site-footer{
      padding:26px 20px 44px;
      border-top:1px solid rgba(255,255,255,.08);
      text-align:center;
      position:relative;
      z-index:1;
      background:#000;
    }

    .footer-meta{
      margin:0 auto;
      max-width:760px;
      color:var(--muted);
      font-size:clamp(.76rem, 2.2vw, .94rem);
      line-height:1.65;
    }

    .footer-meta a{
      color:#fff;
      text-decoration:underline;
      text-underline-offset:4px;
    }
    .bg-rings { position: absolute; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .bg-rings::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.12), transparent 42%),
        linear-gradient(180deg, rgba(0,0,0,.02) 0%, rgba(0,0,0,.5) 58%, rgba(0,0,0,.76) 100%);
    }
    .ring-float { position: absolute; width: clamp(72px, var(--ringVW), var(--ringMax)); aspect-ratio: 1 / 1; padding: 6px; border-radius: 999px; background: rgba(255,255,255,.94); border: 1px solid rgba(16,24,40,.06); box-shadow: 0 18px 36px rgba(0,0,0,.18), 0 2px 6px rgba(16,24,40,.06); opacity: 0; will-change: transform, opacity; animation: fadeCycle var(--dur, 28s) ease-in-out var(--delay, 0s) infinite, drift var(--dur, 28s) linear var(--delay, 0s) infinite alternate; transform: translateZ(0); }
    @keyframes fadeCycle { 0%{opacity:0;} 12%{opacity:.95;} 60%{opacity:.95;} 72%{opacity:0;} 100%{opacity:0;} }
    @keyframes drift { from { transform: translate(0,0) rotate(0.5deg) scale(1); } to { transform: translate(var(--dx, 80px), var(--dy, 80px)) rotate(2deg) scale(1.02); } }

    .shell {
      position: relative;
      z-index: 1;
      width: min(960px, 100%);
      display: grid;
      gap: 18px;
      justify-items: center;
    }
    .form-intro{
      width:min(760px, 100%);
      display:grid;
      gap:10px;
      justify-items:center;
      text-align:center;
    }
    .form-kicker{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border:1px solid rgba(255,255,255,.14);
      border-radius:999px;
      background:rgba(255,255,255,.04);
      color:var(--accent);
      font-size:.72rem;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
      box-shadow:0 12px 30px rgba(0,0,0,.18);
    }
    .form-kicker::before,
    .form-kicker::after{
      content:"";
      width:24px;
      height:1px;
      background:rgba(255,255,255,.28);
    }
    .form-intro p{
      margin:0;
      max-width:56ch;
      color:var(--muted);
      font-size:1rem;
      line-height:1.7;
    }
    .card {
      width: 100%;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        var(--surface);
      backdrop-filter: blur(18px);
      border: 1px solid var(--line);
      border-radius: 34px;
      box-shadow: var(--shadow);
      overflow: visible;
      display: flex;
      flex-direction: column;
      position:relative;
    }
    .card::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.08), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0) 24%);
      opacity:.9;
    }

    .progress { height: 6px; background: rgba(255,255,255,.08); }
    .progress > div {
      height: 6px;
      width: 0;
      background: linear-gradient(90deg, #ffffff 0%, #d7d7d7 52%, #9d9d9d 100%);
      box-shadow:0 0 22px rgba(255,255,255,.14);
      transition: width .25s ease;
    }

    .qa { display: grid; grid-template-rows: auto auto 1fr; min-height: 0; }
    .qa.centered { min-height: 58vh; align-content: center; justify-items: center; }
    .qa.centered .question { font-size: 1.4rem; }
    .qa.centered .input-area { width: min(520px, 92%); }

    .question {
      padding: 38px 38px 14px;
      font-family: var(--heading);
      font-weight: 700;
      text-align: center;
      font-size: clamp(1.38rem, 2.2vw, 2.15rem);
      line-height: 1.06;
      letter-spacing: -.02em;
      text-wrap: balance;
    }
    .input-area {
      padding: 0 38px 38px;
      display: grid;
      gap: 16px;
      align-content: start;
      width:100%;
      box-sizing:border-box;
    }

    .input-area input, .input-area select, .input-area textarea {
      width: 100%;
      padding: 16px 18px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 22px;
      font-size: 1rem;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        rgba(10,10,10,.9);
      color: var(--text);
      text-align: left;
      box-sizing: border-box;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 14px 34px rgba(0,0,0,.18);
      font-family: var(--body);
      outline: none;
      transition: border-color .2s ease, background .2s ease, transform .2s ease, box-shadow .2s ease;
    }
    .input-area select{
      appearance:none;
      -webkit-appearance:none;
      -moz-appearance:none;
      min-height:56px;
      padding-right:56px;
      border-color: rgba(255,255,255,.12);
      background-image:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        radial-gradient(circle at center, rgba(255,255,255,.06), rgba(255,255,255,0) 68%),
        linear-gradient(45deg, transparent 50%, rgba(255,255,255,.86) 50%),
        linear-gradient(135deg, rgba(255,255,255,.86) 50%, transparent 50%);
      background-position:
        0 0,
        calc(100% - 26px) 50%,
        calc(100% - 22px) calc(50% - 3px),
        calc(100% - 16px) calc(50% - 3px);
      background-size:100% 100%, 30px 30px, 6px 6px, 6px 6px;
      background-repeat:no-repeat;
      background-color: rgba(12,12,12,.96);
      color:rgba(255,255,255,.94);
      color-scheme:dark;
      font-weight:600;
      letter-spacing:.01em;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 14px 30px rgba(0,0,0,.22);
      cursor:pointer;
    }
    .input-area select:hover{
      border-color: rgba(255,255,255,.2);
      background-color: rgba(16,16,16,.98);
    }
    .input-area select option{
      background:#101010;
      color:rgba(255,255,255,.94);
    }
    .input-area input:focus, .input-area select:focus, .input-area textarea:focus{
      border-color: rgba(255,255,255,.26);
      background:
        linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,.04)),
        rgba(10,10,10,.96);
      transform: translateY(-1px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 0 0 1px rgba(255,255,255,.08),
        0 16px 36px rgba(0,0,0,.28);
    }

    .input-area textarea { min-height: 120px; resize: vertical; }

    .custom-select{
      position:relative;
      width:100%;
    }

    .custom-select-trigger{
      width:100%;
      min-height:56px;
      padding:16px 52px 16px 18px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        rgba(12,12,12,.96);
      color:rgba(255,255,255,.94);
      text-align:left;
      font:600 1rem var(--body);
      letter-spacing:.01em;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 14px 30px rgba(0,0,0,.22);
      cursor:pointer;
      transition:border-color .2s ease, background .2s ease, transform .2s ease, box-shadow .2s ease;
      position:relative;
    }

    .custom-select-trigger::after{
      content:"";
      position:absolute;
      top:50%;
      right:18px;
      width:10px;
      height:10px;
      border-right:2px solid rgba(255,255,255,.75);
      border-bottom:2px solid rgba(255,255,255,.75);
      transform:translateY(-65%) rotate(45deg);
      transition:transform .2s ease;
      pointer-events:none;
    }

    .custom-select.is-open .custom-select-trigger::after{
      transform:translateY(-25%) rotate(-135deg);
    }

    .custom-select-trigger:hover,
    .custom-select-trigger:focus-visible{
      border-color:rgba(255,255,255,.2);
      background-color:rgba(16,16,16,.98);
      outline:none;
    }

    .custom-select.is-open .custom-select-trigger,
    .custom-select-trigger[data-has-value="true"]:focus-visible{
      border-color: rgba(255,255,255,.26);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 0 0 1px rgba(255,255,255,.08),
        0 16px 36px rgba(0,0,0,.28);
    }

    .custom-select-trigger[data-has-value="false"]{
      color:rgba(255,255,255,.54);
    }

    .custom-select-menu{
      position:fixed;
      inset:0;
      z-index:2000;
      display:grid;
      justify-items:center;
      align-content:start;
      gap:18px;
      padding:28px 20px 32px;
      background:rgba(4,4,4,.985);
      backdrop-filter:blur(16px);
      opacity:0;
      pointer-events:none;
      transform:translateY(18px);
      transition:opacity .18s ease, transform .18s ease;
      overflow:auto;
      overscroll-behavior:contain;
    }

    .custom-select.is-open .custom-select-menu{
      opacity:1;
      pointer-events:auto;
      transform:translateY(0);
    }

    .custom-select-option{
      width:100%;
      padding:16px 18px;
      border:1px solid rgba(255,255,255,.1);
      border-radius:20px;
      background:rgba(255,255,255,.04);
      color:#fff;
      text-align:left;
      font:600 1rem var(--body);
      cursor:pointer;
      transition:background .18s ease, border-color .18s ease, transform .18s ease;
    }

    .custom-select-option:hover,
    .custom-select-option:focus-visible{
      background:rgba(255,255,255,.08);
      border-color:rgba(255,255,255,.12);
      transform:translateY(-1px);
      outline:none;
    }

    .custom-select-option[aria-selected="true"]{
      background:linear-gradient(180deg, #ffffff 0%, #d9d9d9 100%);
      color:#0b0b0b;
      border-color:#ffffff;
    }

    .custom-select-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:4px;
      width:min(720px, 100%);
      position:sticky;
      top:0;
      padding-top:4px;
      background:linear-gradient(180deg, rgba(4,4,4,.985) 0%, rgba(4,4,4,.94) 78%, rgba(4,4,4,0) 100%);
    }

    .custom-select-title{
      margin:0;
      font-family:var(--heading);
      font-size:clamp(1.28rem, 3.5vw, 2rem);
      line-height:1.08;
      letter-spacing:-.02em;
      color:#fff;
    }

    .custom-select-close{
      flex:0 0 auto;
      min-width:44px;
      min-height:44px;
      border:1px solid rgba(255,255,255,.14);
      border-radius:999px;
      background:rgba(255,255,255,.04);
      color:#fff;
      font:700 1.1rem/1 var(--body);
      cursor:pointer;
    }

    .custom-select-list{
      display:grid;
      gap:10px;
      width:min(720px, 100%);
      padding-bottom:16px;
    }

    .input-area input[type="number"]{
      -moz-appearance:textfield;
      appearance:textfield;
    }

    .input-area input[type="number"]::-webkit-outer-spin-button,
    .input-area input[type="number"]::-webkit-inner-spin-button{
      -webkit-appearance:none;
      margin:0;
    }

    .pill-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
    .choice-grid{
      --shape-columns:3;
      display:grid;
      grid-template-columns:repeat(var(--shape-columns), minmax(0, 1fr));
      gap:12px;
    }
    .shape-btn{
      position:relative;
      display:grid;
      align-items:end;
      min-height:148px;
      padding:0;
      border:1px solid rgba(255,255,255,.12);
      border-radius:26px;
      background:#0d0d0d;
      color:var(--text);
      cursor:pointer;
      transition:transform .2s ease, border-color .2s ease, background .2s ease, box-shadow .2s ease;
      font:inherit;
      font-weight:700;
      box-shadow:0 10px 24px rgba(0,0,0,.14);
      overflow:hidden;
    }
    .shape-btn:hover,
    .shape-btn:focus-visible{
      transform:translateY(-2px);
      border-color:rgba(255,255,255,.22);
      box-shadow:0 18px 30px rgba(0,0,0,.22);
      outline:none;
    }
    .shape-btn[aria-pressed="true"]{
      border-color:#ffffff;
      box-shadow:0 20px 44px rgba(0,0,0,.28), 0 0 0 1px rgba(255,255,255,.18);
    }
    .shape-btn::after{
      display:none;
    }
    .shape-btn-media{
      position:absolute;
      inset:0 0 46px 0;
      display:grid;
      place-items:center;
      padding:14px;
      background:#ffffff;
    }
    .shape-btn img{
      width:100%;
      height:100%;
      object-fit:contain;
      transition:transform .18s ease, opacity .18s ease;
      pointer-events:none;
      opacity:.92;
    }
    .shape-btn[aria-pressed="true"] img{
      transform:scale(1.03);
      opacity:1;
    }
    .shape-btn span{
      position:relative;
      z-index:2;
      width:100%;
      margin-top:auto;
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      font-size:.92rem;
      line-height:1.2;
      text-align:center;
      pointer-events:none;
      color:#0b0b0b;
      background:#ffffff;
    }
    .range-wrap{
      display:grid;
      gap:12px;
    }
    .range-readout{
      display:grid;
      place-items:center;
      min-height:62px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:22px;
      background:rgba(255,255,255,.05);
      color:var(--text);
      font-size:1.1rem;
      font-weight:800;
      letter-spacing:.02em;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }
    .range-wrap input[type="range"]{
      padding:0;
      border:0;
      background:transparent;
      box-shadow:none;
      transform:none;
    }
    .range-wrap input[type="range"]:focus{
      background:transparent;
      transform:none;
    }
    .range-wrap input[type="range"]::-webkit-slider-runnable-track{
      height:8px;
      border-radius:999px;
      background:linear-gradient(90deg, rgba(255,255,255,.16), rgba(255,255,255,.32));
    }
    .range-wrap input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:24px;
      height:24px;
      margin-top:-8px;
      border-radius:999px;
      background:linear-gradient(180deg, #ffffff, #d9d9d9);
      border:0;
      box-shadow:0 8px 18px rgba(0,0,0,.26);
    }
    .range-wrap input[type="range"]::-moz-range-track{
      height:8px;
      border-radius:999px;
      background:linear-gradient(90deg, rgba(255,255,255,.16), rgba(255,255,255,.32));
    }
    .range-wrap input[type="range"]::-moz-range-thumb{
      width:24px;
      height:24px;
      border:none;
      border-radius:999px;
      background:linear-gradient(180deg, #ffffff, #d9d9d9);
      box-shadow:0 8px 18px rgba(0,0,0,.26);
    }
    .range-scale{
      display:flex;
      justify-content:space-between;
      gap:10px;
      color:var(--muted);
      font-size:.82rem;
    }
    .pill {
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      color:var(--text);
      border-radius: 999px;
      padding: 12px 17px;
      cursor: pointer;
      font-weight: 700;
      font-size: .95rem;
      font-family: var(--body);
      transition: background .2s ease, border-color .2s ease, transform .2s ease, box-shadow .2s ease;
      box-shadow:0 10px 22px rgba(0,0,0,.12);
    }
    .pill:hover{
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.22);
      box-shadow:0 14px 24px rgba(0,0,0,.18);
    }
    .pill[aria-pressed="true"]{
      background:linear-gradient(180deg, #ffffff 0%, #d9d9d9 100%);
      color:#0b0b0b;
      border-color:#ffffff;
    }

    .unit-input { display:grid; grid-template-columns: 1fr auto; gap: 10px; align-items:center; }
    .unit-input .unit { padding: 14px 16px; border:1px solid rgba(255,255,255,.12); border-radius:22px; background:rgba(255,255,255,.05); color:var(--text); min-width: 78px; text-align:center; }

    .budget-row { display:grid; grid-template-columns: minmax(92px, auto) 1fr auto; gap: 12px; align-items:center; }
    .budget-row select { min-width: 92px; }

    .inline-next {
      background:linear-gradient(180deg, #ffffff 0%, #d9d9d9 100%);
      color:#0b0b0b;
      border:1px solid rgba(255,255,255,.9);
      padding:14px 20px;
      border-radius:20px;
      cursor:pointer;
      justify-self:center;
      width: min(220px, 100%);
      font-weight:800;
      font-family: var(--body);
      box-shadow:0 18px 34px rgba(0,0,0,.24);
      transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }
    .inline-next:hover,
    .inline-next:focus-visible{
      transform:translateY(-2px);
      box-shadow:0 22px 40px rgba(0,0,0,.28);
      outline:none;
    }
    .inline-next[disabled]{ opacity:.5; cursor:not-allowed; box-shadow:none; transform:none; }

    .inline-actions { display:grid; gap:10px; justify-items:center; margin-top: 6px; }
    .hint-btn {
      background:rgba(255,255,255,.04);
      color:var(--text);
      border:1px solid rgba(255,255,255,.12);
      padding:13px 18px;
      border-radius:20px;
      cursor:pointer;
      width: min(260px, 100%);
      font-family: var(--body);
      font-weight:700;
      transition:transform .2s ease, border-color .2s ease, background .2s ease;
    }
    .hint-btn:hover,
    .hint-btn:focus-visible{
      transform:translateY(-2px);
      border-color:rgba(255,255,255,.22);
      background:rgba(255,255,255,.06);
      outline:none;
    }
    .subtle { font-size:.92rem; color:var(--muted); text-align:center; font-family: var(--body); line-height:1.55; }

    .error-line { font-size:.95rem; color:#ff8a8a; text-align:center; min-height: 1.2em; font-family: var(--body); }

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const inputArea  = document.getElementById('inputArea');
    const questionEl = document.getElementById('questionText');
    const progressEl = document.getElementById('progressBar');
    const qaCard     = document.getElementById('qaCard');
    const formEl     = document.getElementById('nf');
    let openCustomSelect = null;

    function safeGtagEvent(name, params){
      try{
        if(typeof gtag === 'function'){
          gtag('event', name, params || {});
        }
      }catch(_){}
    }

    function closeCustomSelect(){
      if(!openCustomSelect) return;
      const openTrigger = openCustomSelect.querySelector('.custom-select-trigger');
      openCustomSelect.classList.remove('is-open');
      if(openTrigger) openTrigger.setAttribute('aria-expanded', 'false');
      openCustomSelect = null;
      document.body.classList.remove('custom-select-open');
    }

    document.addEventListener('click', (event) => {
      if(openCustomSelect && event.target instanceof Node && !openCustomSelect.contains(event.target)){
        closeCustomSelect();
      }
    });

    document.addEventListener('keydown', (event) => {
      if(event.key === 'Escape' && openCustomSelect){
        closeCustomSelect();
      }
    });

    function createCustomSelect(config){
      const wrap = document.createElement('div');
      wrap.className = 'custom-select';

      const trigger = document.createElement('button');
      trigger.type = 'button';
      trigger.className = 'custom-select-trigger';
      trigger.setAttribute('aria-haspopup', 'listbox');
      trigger.setAttribute('aria-expanded', 'false');
      trigger.setAttribute('aria-label', config.label);

      const valueEl = document.createElement('span');
      valueEl.dataset.customSelectValue = 'true';
      trigger.appendChild(valueEl);

      const menu = document.createElement('div');
      menu.className = 'custom-select-menu';
      menu.setAttribute('role', 'listbox');

      const header = document.createElement('div');
      header.className = 'custom-select-header';

      const title = document.createElement('h3');
      title.className = 'custom-select-title';
      title.textContent = config.label;

      const closeBtn = document.createElement('button');
      closeBtn.type = 'button';
      closeBtn.className = 'custom-select-close';
      closeBtn.setAttribute('aria-label', 'Close options');
      closeBtn.textContent = '×';
      closeBtn.addEventListener('click', () => {
        wrap.classList.remove('is-open');
        trigger.setAttribute('aria-expanded', 'false');
        openCustomSelect = null;
      });

      header.appendChild(title);
      header.appendChild(closeBtn);

      const list = document.createElement('div');
      list.className = 'custom-select-list';

      const setValue = (nextValue) => {
        valueEl.dataset.value = nextValue || '';
        valueEl.textContent = nextValue || config.placeholder || 'Select';
        trigger.dataset.hasValue = nextValue ? 'true' : 'false';

        Array.from(list.children).forEach((child) => {
          if(child instanceof HTMLButtonElement){
            child.setAttribute('aria-selected', String(child.dataset.value === (nextValue || '')));
          }
        });
      };

      (config.options || []).forEach((opt) => {
        const optionBtn = document.createElement('button');
        optionBtn.type = 'button';
        optionBtn.className = 'custom-select-option';
        optionBtn.dataset.value = opt;
        optionBtn.setAttribute('role', 'option');
        optionBtn.textContent = opt;
        optionBtn.addEventListener('click', () => {
          setValue(opt);
          closeCustomSelect();
          if(typeof config.onSelect === 'function') config.onSelect(opt);
        });
        list.appendChild(optionBtn);
      });

      trigger.addEventListener('click', () => {
        const isOpen = wrap.classList.contains('is-open');
        if(openCustomSelect && openCustomSelect !== wrap){
          closeCustomSelect();
        }
        wrap.classList.toggle('is-open', !isOpen);
        trigger.setAttribute('aria-expanded', String(!isOpen));
        openCustomSelect = !isOpen ? wrap : null;
        document.body.classList.toggle('custom-select-open', !isOpen);
      });

      setValue(config.value || '');
      menu.appendChild(header);
      menu.appendChild(list);
      wrap.appendChild(trigger);
      wrap.appendChild(menu);

      return {
        element: wrap,
        getValue: () => valueEl.dataset.value || '',
        setValue
      };
    }

    const ringStyles = [
      'Solitaire','Halo','Hidden halo','Three stone','Bezel','Cathedral','Pavé','Modern minimalist','Other'
    ];

    const gemstoneOptions = ['Sapphire','Emerald','Ruby','Tourmaline','Tanzanite','Aquamarine','Alexandrite','Spinel','Opal','Topaz','Garnet','Morganite','Peridot','Zircon','Amethyst','Kunzite','Grandidierite','Ametrine','Jade','Citrine','Moonstone','Sodalite','Quartz','Chrysoberyl','Beryl','Apatite','Sphene','Heliodor','Prehnite','Spectrolite','Other'];
    const diamondShapes = ['Round','Oval','Cushion','Emerald','Radiant','Princess','Asscher','Pear','Marquise','Heart',"I don't know",'Other'];
    const shapeImageMap = {
      Round: 'Images/diamond shapes/round.png',
      Cushion: 'Images/diamond shapes/cushion.png',
      Oval: 'Images/diamond shapes/oval.png',
      Emerald: 'Images/diamond shapes/emerald.png',
      Radiant: 'Images/diamond shapes/radiant.png',
      Princess: 'Images/diamond shapes/princess.png',
      Asscher: 'Images/diamond shapes/asscher.png',
      Pear: 'Images/diamond shapes/pear.png',
      Marquise: 'Images/diamond shapes/marquis.png',
      Heart: 'Images/diamond shapes/heart.png'
    };
    const diamondColour = ['D-F','D','E','F','G','H','I','J','K','K+','Fancy colour'];
    const fancyDiamondColours = [
      'Yellow',
      'Pink',
      'Blue',
      'Green',
      'Champagne',
      'Cognac',
      'Brown',
      'Black',
      'Orange',
      'Purple',
      'Red',
      'Grey',
      'Chameleon',
      'Other'
    ];
    const diamondClarity = ['Eye Clean','FL','IF','VVS1','VVS2','VS1','VS2','SI1','SI2','I1+'];

    const steps = [
      { key: 'materialType', type: 'choice', label: 'Would you like a Diamond or a Gemstone', options: [
        { label: 'Diamond', value: 'diamond' },
        { label: 'Gemstone', value: 'gemstone' }
      ]},

      { key: 'diamondOrigin', type: 'choice', path: 'diamond', label: 'Lab grown or Natural', options: [
        { label: 'Lab Grown', value: 'lab' },
        { label: 'Natural', value: 'natural' }
      ]},

      { key: 'shape', type: 'shape-grid', path: 'diamond', label: 'What shape diamond are you after', options: diamondShapes },
      { key: 'ring_style', type: 'select', path: 'diamond', label: 'Do you know what style of ring you are looking for', options: ringStyles },
      { key: 'caratSize', type: 'range', path: 'diamond', label: 'What size diamond in carats', min: 0.5, max: 8.1, step: 0.1, defaultValue: 1.5 },
      { key: 'colour', type: 'select', path: 'diamond', label: 'Diamond colour preference', options: diamondColour },
      { key: 'fancy_colour', type: 'select', path: 'diamond', label: 'Which fancy diamond colour', options: fancyDiamondColours },
      { key: 'clarity', type: 'select', path: 'diamond', label: 'Diamond clarity preference', options: diamondClarity },

      { key: 'gemstone', type: 'select', path: 'gemstone', label: 'Which gemstone', options: gemstoneOptions },
      { key: 'shape', type: 'shape-grid', path: 'gemstone', label: 'What shape stone are you after', options: diamondShapes },
      { key: 'ring_style', type: 'select', path: 'gemstone', label: 'Do you know what style of ring you are looking for', options: ringStyles },
      { key: 'caratSize', type: 'range', path: 'gemstone', label: 'What size stone in carats', min: 0.5, max: 8.1, step: 0.1, defaultValue: 1.5 },

      { key: 'metal', type: 'choice', label: 'Choose a metal for the setting', options: [
        { label: 'Yellow Gold', value: 'Yellow Gold' },
        { label: 'White Gold', value: 'White Gold' },
        { label: 'Rose Gold', value: 'Rose Gold' },
        { label: 'Platinum', value: 'Platinum' }
      ]},
      { key: 'gold_karat', type: 'choice', path: 'gold', label: 'Choose gold karat, or Not sure', options: [
        { label: '9k', value: '9k' }, { label: '14k', value: '14k' }, { label: '18k', value: '18k' }, { label: 'Not sure', value: 'Not sure' }
      ]},

      { key: 'budget', type: 'budget', label: 'What budget feels comfortable for the finished ring', },
      { key: 'deadline', type: 'date', label: 'Any deadline, or no rush' },

      { key: 'email', type: 'email', label: 'What email should we send your price estimate to' },

      { key: 'references', type: 'file', label: 'Upload inspiration photos, optional' },
      { key: 'notes', type: 'textarea', label: 'Any additional notes, optional' },

      {
        key: 'ring_size',
        type: 'select',
        label: 'Select the ring size, UK or US',
        options: [
          'UK A','UK A½','UK B','UK B½','UK C','UK C½','UK D','UK D½','UK E','UK E½','UK F','UK F½','UK G','UK G½','UK H','UK H½','UK I','UK I½','UK J','UK J½','UK K','UK K½','UK L','UK L½','UK M','UK M½','UK N','UK N½','UK O','UK O½','UK P','UK P½','UK Q','UK Q½','UK R','UK R½','UK S','UK S½','UK T','UK T½','UK U','UK U½','UK V','UK V½','UK W','UK W½','UK X','UK X½','UK Y','UK Y½','UK Z',
          'US 3','US 3¼','US 3½','US 3¾','US 4','US 4¼','US 4½','US 4¾','US 5','US 5¼','US 5½','US 5¾','US 6','US 6¼','US 6½','US 6¾','US 7','US 7¼','US 7½','US 7¾','US 8','US 8¼','US 8½','US 8¾','US 9','US 9¼','US 9½','US 9¾','US 10','US 10¼','US 10½','US 10¾','US 11','US 11¼','US 11½','US 11¾','US 12','US 12¼','US 12½','US 12¾','US 13',
          'Not sure'
        ]
      },

      { key: 'name', type: 'text', label: 'What is your first name' }
    ];

    const formData = {};
    let index = 0;

    (function hydrateReferenceFromQuery(){
      const params = new URLSearchParams(window.location.search);
      const referenceRing = params.get('ring') || params.get('reference') || '';
      const referenceProduct = params.get('product') || '';
      const referenceSize = params.get('size') || '';

      if (referenceRing) formData.reference_ring = referenceRing;
      if (referenceProduct) formData.reference_product = referenceProduct;
      if (referenceSize) formData.reference_size = referenceSize;
    })();

    function isGold(m){ return m === 'Yellow Gold' || m === 'White Gold' || m === 'Rose Gold'; }

    function applicable(step){
      if(step.key === 'gold_karat') return isGold(formData.metal);
      if(step.key === 'fancy_colour') return formData.materialType === 'diamond' && formData.colour === 'Fancy colour';
      if(!step.path) return true;
      if(step.path === 'gold') return isGold(formData.metal);
      if(step.path === 'diamond') return formData.materialType === 'diamond';
      if(step.path === 'gemstone') return formData.materialType === 'gemstone';
      return true;
    }

    function nextIndex(from){
      let i = from + 1;
      while(i < steps.length && !applicable(steps[i])) i++;
      return i;
    }

    function visibleSteps(){ return steps.filter(applicable); }
    function totalSteps(){ return visibleSteps().length; }

    function currentVisibleIndex(){
      const vis = visibleSteps();
      const cur = steps[index];
      const pos = vis.findIndex(s => s === cur);
      return pos >= 0 ? pos : 0;
    }

    function updateProgress(){
      const total = totalSteps();
      const current = currentVisibleIndex();
      const done = Math.max(0, current);
      const pct = total ? Math.round((done / total) * 100) : 0;
      progressEl.style.width = pct + '%';
    }

    function isValidEmail(s){
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(s || '').trim());
    }

    function currencySymbol(code){
      if(code === 'GBP') return '\u00A3';
      if(code === 'USD') return '$';
      if(code === 'EUR') return '\u20AC';
      return '';
    }

    function composeSummary(){
      const isDiamond = formData.materialType === 'diamond';
      const isGem     = formData.materialType === 'gemstone';
      const prettyOrigin = formData.diamondOrigin === 'lab' ? 'Lab Grown'
                          : formData.diamondOrigin === 'natural' ? 'Natural' : '';

      const fi = document.getElementById('uploadInput');
      const refNames = fi && fi.files && fi.files.length
        ? Array.from(fi.files).map(f => f.name)
        : [];

      const lines = [];

      if(formData.reference_product) lines.push(`Reference product:\n${formData.reference_product}`);
      if(formData.reference_ring) lines.push(`Reference slug:\n${formData.reference_ring}`);
      if(formData.reference_size) lines.push(`Requested size:\n${formData.reference_size}`);

      if(formData.ring_style) lines.push(`Ring style:\n${formData.ring_style}`);

      if(formData.metal) lines.push(`Metal:\n${formData.metal}`);
      if(isGold(formData.metal) && formData.gold_karat) lines.push(`Gold Karat:\n${formData.gold_karat}`);

      if(formData.budget_amount){
        const sym = currencySymbol(formData.budget_currency || 'GBP');
        lines.push(`Budget:\n${sym}${formData.budget_amount}`);
      }

      if(isDiamond) lines.push(`Stone:\nDiamond`);
      if(isGem && formData.gemstone) lines.push(`Stone:\n${formData.gemstone}`);

      if(isDiamond && prettyOrigin) lines.push(`Type:\n${prettyOrigin}`);

      if(formData.shape) lines.push(`Shape:\n${formData.shape}`);
      if(formData.caratSize) lines.push(`carat:\n${formData.caratSize}`);

      if(isDiamond && formData.colour) lines.push(`Colour:\n${formData.colour === 'Fancy colour' && formData.fancy_colour ? `Fancy - ${formData.fancy_colour}` : formData.colour}`);
      if(isDiamond && formData.clarity) lines.push(`Clarity:\n${formData.clarity}`);

      if(formData.deadline) lines.push(`Need by:\n${formData.deadline}`);
      if(formData.ring_size) lines.push(`Ring size:\n${formData.ring_size}`);

      if(refNames.length) lines.push(`Inspiration:\n${refNames.join(', ')}`);
      if(formData.inspiration_notes) lines.push(`Describe:\n${formData.inspiration_notes}`);
      if(formData.notes) lines.push(`Notes:\n${formData.notes}`);
      if(formData.name) lines.push(`Name:\n${formData.name}`);

      return lines.join('\n\n');
    }

    function buildSubject(){
      return `Diamond Concierge${formData.name ? ` for ${formData.name}` : ''}`;
    }

    function setHiddenFields(subject, summary){
      const hs = document.getElementById('hiddenSubject');
      const he = document.getElementById('hiddenEmail');
      const hm = document.getElementById('hiddenSummary');
      const hn = document.getElementById('hiddenCustomerName');
      if(hs) hs.value = subject || '';
      if(he) he.value = formData.email || '';
      if(hm) hm.value = summary || '';
      if(hn) hn.value = formData.name || '';
    }

    function buildFormData(){
      const fd = new FormData(formEl);
      const fi = document.getElementById('uploadInput');
      if (fi && fi.files){
        fd.delete('references');
        Array.from(fi.files).forEach(file => {
          fd.append('references', file, file.name);
        });
      }
      return fd;
    }

    let hasFinalSent = false;
    let hasPartialSent = false;

    function showSendingState(){
      if(qaCard){
        qaCard.querySelectorAll('input, select, textarea, button').forEach(el => el.disabled = true);
      }
      if(questionEl) questionEl.textContent = 'Sending your details';
      inputArea.innerHTML = '<div class="subtle">Please keep this page open for a moment.</div>';
    }

    function redirectToThankYou(){
      window.location.assign('/thank-you.html');
    }

    async function sendFinal(){
      if(hasFinalSent) return;
      hasFinalSent = true;

      showSendingState();

      const subject = buildSubject();
      const summary = composeSummary();
      setHiddenFields(subject, summary);

      safeGtagEvent('form_submit_attempt', { page_location: window.location.href });

      safeGtagEvent('form_submit_success', { page_location: window.location.href });
      formEl.submit();
    }

    async function sendPartialOnce(){
      return;
    }

    let idleTimer = null;
    function resetIdleOneShot(){
      if(idleTimer) clearTimeout(idleTimer);
      idleTimer = setTimeout(sendPartialOnce, 90000);
    }

    document.addEventListener('input', resetIdleOneShot, true);
    document.addEventListener('pointerdown', resetIdleOneShot, true);
    document.addEventListener('visibilitychange', () => { if(document.hidden) sendPartialOnce(); });
    window.addEventListener('pagehide', () => { sendPartialOnce(); });
    window.addEventListener('beforeunload', () => { sendPartialOnce(); });

    function selectChoice(value, btn, row){
      Array.from(row.querySelectorAll('[aria-pressed]')).forEach(el => el.setAttribute('aria-pressed','false'));
      btn.setAttribute('aria-pressed','true');
      commitAnswer(value);
    }

    function readCurrentInput(){
      const step = steps[index];
      if(step.type === 'choice') return null;
      if(step.type === 'shape-grid') return null;
      if(step.type === 'file') return '';
      if(step.type === 'number' || step.type === 'email' || step.type === 'text' || step.type === 'date'){
        const ctrl = inputArea.querySelector('input');
        return ctrl ? ctrl.value.trim() : '';
      }
      if(step.type === 'range'){
        const ctrl = inputArea.querySelector('input[type="range"]');
        return ctrl ? ctrl.value.trim() : '';
      }
      if(step.type === 'textarea'){
        const ctrl = inputArea.querySelector('textarea');
        return ctrl ? ctrl.value.trim() : '';
      }
      if(step.type === 'select'){
        const ctrl = inputArea.querySelector('[data-custom-select-value]');
        return ctrl ? (ctrl.getAttribute('data-value') || '').trim() : '';
      }
      return '';
    }

    function commitAnswer(value){
      const step = steps[index];

      if(step.type === 'budget' && value === 'BUDGET_CONFIRMED'){
      } else if(step.type === 'file'){
      } else {
        let v = value != null ? value : readCurrentInput();

        if(step.key === 'email'){
          if(!isValidEmail(v)) return;
          formData.email = String(v).trim();
          safeGtagEvent('email_captured', { page_location: window.location.href });
          requestLocationLookupOnce();
        }

        if(step.key === 'metal') formData.metal = v;
        if(step.key === 'colour' && v !== 'Fancy colour') delete formData.fancy_colour;

        if(step.type !== 'budget'){
          formData[step.key] = v;
        }
      }

      resetIdleOneShot();

      safeGtagEvent('step_complete', { step_key: step.key, page_location: window.location.href });

      index = nextIndex(index);
      if(index >= steps.length){ sendFinal(); return; }
      renderStep();
    }

    let didLocationLookup = false;
    function requestLocationLookupOnce(){
      if(didLocationLookup) return;
      didLocationLookup = true;

      try {
        fetch('https://ipapi.co/json/')
          .then(r => r.json())
          .then(loc => {
            if(!loc) return;
            const c = document.getElementById('locCity');
            const r = document.getElementById('locRegion');
            const k = document.getElementById('locCountry');
            if(c) c.value = loc.city || '';
            if(r) r.value = loc.region || '';
            if(k) k.value = loc.country_name || '';
          })
          .catch(()=>{});
      } catch(_){}
    }

    function renderStep(errorText){
      const step = steps[index];

      safeGtagEvent('step_view', { step_key: step.key, page_location: window.location.href });

      if(qaCard){
        if(step.key === 'email') qaCard.classList.add('centered');
        else qaCard.classList.remove('centered');
      }

      const labelText = step.label.endsWith('?') || step.label.endsWith(':') ? step.label : (step.label + '?');
      questionEl.textContent = labelText;

      inputArea.innerHTML = '';

      const errorLine = document.createElement('div');
      errorLine.className = 'error-line';
      errorLine.textContent = errorText || '';
      inputArea.appendChild(errorLine);

      let inputEl = null;

      if(step.type === 'choice'){
        const row = document.createElement('div');
        row.className = 'pill-row';
        step.options.forEach(opt => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'pill';
          btn.textContent = opt.label;
          btn.addEventListener('click', () => selectChoice(opt.value, btn, row));
          row.appendChild(btn);
        });
        inputArea.appendChild(row);
      }

      if(step.type === 'shape-grid'){
        const shapeWrap = document.createElement('div');
        const grid = document.createElement('div');
        grid.className = 'choice-grid';
        const compactActions = document.createElement('div');
        compactActions.className = 'inline-actions';

        step.options.forEach(opt => {
          const imagePath = shapeImageMap[opt];
          if(!imagePath){
            const actionBtn = document.createElement('button');
            actionBtn.type = 'button';
            actionBtn.className = 'hint-btn';
            actionBtn.textContent = opt;
            actionBtn.addEventListener('click', () => commitAnswer(opt));
            compactActions.appendChild(actionBtn);
            return;
          }

          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'shape-btn';
          btn.setAttribute('aria-pressed', 'false');
          btn.setAttribute('aria-label', opt);

          const media = document.createElement('div');
          media.className = 'shape-btn-media';
          const image = document.createElement('img');
          image.src = imagePath;
          image.alt = '';
          image.loading = 'eager';
          image.decoding = 'async';
          image.onerror = () => {
            image.onerror = null;
            image.src = imagePath.replace('Images/diamond shapes/', 'Images/diamond%20shapes/');
          };
          media.appendChild(image);
          btn.appendChild(media);

          const label = document.createElement('span');
          label.textContent = opt;
          btn.appendChild(label);

          btn.addEventListener('click', () => selectChoice(opt, btn, shapeWrap));
          grid.appendChild(btn);
        });

        shapeWrap.appendChild(grid);
        if(compactActions.children.length) shapeWrap.appendChild(compactActions);
        inputArea.appendChild(shapeWrap);

      }

      if(step.type === 'select'){
        const customSelect = createCustomSelect({
          label: step.label,
          placeholder: 'Select',
          options: step.options,
          onSelect: (value) => { if(value) commitAnswer(value); }
        });
        inputArea.appendChild(customSelect.element);

        const actions = document.createElement('div');
        actions.className = 'inline-actions';

        if(step.key === 'colour' || step.key === 'clarity'){
          const helpBtn = document.createElement('button');
          helpBtn.type = 'button';
          helpBtn.className = 'hint-btn';
          helpBtn.textContent = 'Need help';
          helpBtn.addEventListener('click', () => commitAnswer('Need help'));
          actions.appendChild(helpBtn);
        }

        if(step.key === 'ring_style' || step.key === 'shape'){
          const idkBtn = document.createElement('button');
          idkBtn.type = 'button';
          idkBtn.className = 'hint-btn';
          idkBtn.textContent = "I don't know";
          idkBtn.addEventListener('click', () => commitAnswer("I don't know"));
          actions.appendChild(idkBtn);
        }

        if(step.key === 'ring_size'){
          const idkBtn = document.createElement('button');
          idkBtn.type = 'button';
          idkBtn.className = 'hint-btn';
          idkBtn.textContent = 'Not sure';
          idkBtn.addEventListener('click', () => commitAnswer('Not sure'));
          actions.appendChild(idkBtn);
        }

        if(actions.children.length) inputArea.appendChild(actions);
      }

      if(step.type === 'budget'){
        const wrap = document.createElement('div');
        wrap.className = 'budget-row';

        const currencySelect = createCustomSelect({
          label: 'Currency',
          options: ['GBP','USD','EUR'],
          value: 'GBP'
        });

        const amount = document.createElement('input');
        amount.type = 'number';
        amount.placeholder = 'e.g. 2500';
        amount.step = '1';
        amount.setAttribute('aria-label','Budget amount');

        const inlineNext = document.createElement('button');
        inlineNext.type = 'button';
        inlineNext.className = 'inline-next';
        inlineNext.textContent = 'Next';
        inlineNext.disabled = true;

        const enableCheck = () => { inlineNext.disabled = !(amount.value && String(amount.value).trim().length > 0); };
        amount.addEventListener('input', enableCheck);

        inlineNext.addEventListener('click', () => {
          formData.budget_amount = (amount.value || '').trim();
          formData.budget_currency = currencySelect.getValue();
          if(formData.budget_amount) commitAnswer('BUDGET_CONFIRMED');
        });

        amount.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); inlineNext.click(); } });

        wrap.appendChild(currencySelect.element);
        wrap.appendChild(amount);
        wrap.appendChild(inlineNext);
        inputArea.appendChild(wrap);

        const unsure = document.createElement('button');
        unsure.type = 'button';
        unsure.className = 'hint-btn';
        unsure.textContent = 'Not sure';
        unsure.addEventListener('click', () => {
          formData.budget_amount = 'Not sure';
          formData.budget_currency = currencySelect.getValue();
          commitAnswer('BUDGET_CONFIRMED');
        });
        inputArea.appendChild(unsure);

        inputEl = amount;
      }

      if(step.type === 'email' || step.type === 'text' || step.type === 'number' || step.type === 'date' || step.type === 'range'){
        if(step.type === 'range'){
          const wrap = document.createElement('div');
          wrap.className = 'range-wrap';

          const readout = document.createElement('div');
          readout.className = 'range-readout';

          inputEl = document.createElement('input');
          inputEl.type = 'range';
          inputEl.min = String(step.min ?? 0.5);
          inputEl.max = String(step.max ?? 5);
          inputEl.step = String(step.step ?? 0.1);
          inputEl.value = String(step.defaultValue ?? 1.5);
          inputEl.setAttribute('aria-label', step.label);

          const updateReadout = () => {
            const currentValue = Number(inputEl.value);
            const maxValue = Number(inputEl.max);
            if (currentValue >= maxValue) {
              readout.textContent = '8+ ct';
              return;
            }

            const displayValue = Number.isInteger(currentValue) ? String(currentValue) : currentValue.toFixed(1);
            readout.textContent = `${displayValue} ct`;
          };
          updateReadout();
          inputEl.addEventListener('input', updateReadout);

          const scale = document.createElement('div');
          scale.className = 'range-scale';
          scale.innerHTML = `<span>${inputEl.min} ct</span><span>8+ ct</span>`;

          wrap.appendChild(readout);
          wrap.appendChild(inputEl);
          wrap.appendChild(scale);
          inputArea.appendChild(wrap);
        } else {
          inputEl = document.createElement('input');
          inputEl.type = step.type === 'number' ? 'number' : (step.type === 'date' ? 'date' : step.type);
          if(step.step) inputEl.step = step.step;
          if(step.placeholder) inputEl.placeholder = step.placeholder;
          inputEl.setAttribute('aria-label', step.label);
          inputArea.appendChild(inputEl);
        }

        if(step.key === 'email'){
          const reassurance = document.createElement('div');
          reassurance.className = 'subtle';
          reassurance.textContent = 'Used only to send your estimate and save your progress. No marketing.';
          inputArea.appendChild(reassurance);
        }

        const actions = document.createElement('div');
        actions.className = 'inline-actions';

        if(step.key === 'deadline'){
          const noneBtn = document.createElement('button');
          noneBtn.type = 'button';
          noneBtn.className = 'hint-btn';
          noneBtn.textContent = 'No rush';
          noneBtn.addEventListener('click', () => commitAnswer('No rush'));
          actions.appendChild(noneBtn);
        }

        if(step.key === 'caratSize'){
          const unsureBtn = document.createElement('button');
          unsureBtn.type = 'button';
          unsureBtn.className = 'hint-btn';
          unsureBtn.textContent = 'Not sure';
          unsureBtn.addEventListener('click', () => commitAnswer('Not sure'));
          actions.appendChild(unsureBtn);
        }

        const nextBtn = document.createElement('button');
        nextBtn.type = 'button';
        nextBtn.className = 'inline-next';
        nextBtn.textContent = 'Next';
        nextBtn.disabled = (step.key === 'email');

        nextBtn.addEventListener('click', () => {
          const v = readCurrentInput();
          if(step.key === 'email' && !isValidEmail(v)){
            errorLine.textContent = 'Please enter a valid email address.';
            return;
          }
          commitAnswer();
        });

        if(step.key === 'email'){
          inputEl.addEventListener('input', () => {
            const v = String(inputEl.value || '').trim();
            const ok = isValidEmail(v);
            nextBtn.disabled = !ok;
            formData.email = ok ? v : '';
            if(ok) errorLine.textContent = '';
          });
        }

        if(step.key === 'deadline' && step.type === 'date'){
          inputEl.addEventListener('change', () => {
            const v = String(inputEl.value || '').trim();
            if(v) commitAnswer(v);
          });
        }

        actions.appendChild(nextBtn);
        inputArea.appendChild(actions);
      }

      if(step.type === 'textarea'){
        inputEl = document.createElement('textarea');
        inputEl.setAttribute('aria-label', step.label);
        inputArea.appendChild(inputEl);

        const nextBtn = document.createElement('button');
        nextBtn.type = 'button';
        nextBtn.className = 'inline-next';
        nextBtn.textContent = 'Next';
        nextBtn.addEventListener('click', () => commitAnswer());
        inputArea.appendChild(nextBtn);
      }

      if(step.type === 'file'){
        const fi = document.getElementById('uploadInput');

        const pick = document.createElement('button');
        pick.type = 'button';
        pick.className = 'hint-btn';
        pick.textContent = 'Choose files';
        pick.addEventListener('click', () => fi.click());
        inputArea.appendChild(pick);

        const list = document.createElement('div');
        list.className = 'subtle';
        list.textContent = fi.files && fi.files.length ? Array.from(fi.files).map(f => f.name).join(', ') : 'No files chosen';
        fi.addEventListener('change', () => {
          list.textContent = fi.files && fi.files.length ? Array.from(fi.files).map(f => f.name).join(', ') : 'No files chosen';
        });
        inputArea.appendChild(list);

        const line = document.createElement('div');
        line.className = 'subtle';
        line.textContent = 'Add a short note, optional';
        inputArea.appendChild(line);

        const describe = document.createElement('textarea');
        describe.placeholder = 'Optional';
        describe.setAttribute('aria-label','Describe what you are looking for');
        inputArea.appendChild(describe);

        const actions = document.createElement('div');
        actions.className = 'inline-actions';

        const skip = document.createElement('button');
        skip.type = 'button';
        skip.className = 'hint-btn';
        skip.textContent = 'Skip';
        skip.addEventListener('click', () => {
          formData.inspiration_notes = '';
          commitAnswer('FILE_STEP_DONE');
        });

        const inlineNext = document.createElement('button');
        inlineNext.type = 'button';
        inlineNext.className = 'inline-next';
        inlineNext.textContent = 'Next';
        inlineNext.addEventListener('click', () => {
          formData.inspiration_notes = (describe.value || '').trim();
          commitAnswer('FILE_STEP_DONE');
        });

        actions.appendChild(skip);
        actions.appendChild(inlineNext);
        inputArea.appendChild(actions);

        inputEl = pick;
      }

      inputArea.onkeydown = (e) => {
        const tag = e.target && e.target.tagName;
        if(e.key === 'Enter' && tag !== 'TEXTAREA' && step.type !== 'budget' && step.type !== 'file' && step.type !== 'choice' && step.type !== 'select' && step.type !== 'shape-grid'){
          e.preventDefault();
          const v = readCurrentInput();
          if(step.key === 'email' && !isValidEmail(v)){
            errorLine.textContent = 'Please enter a valid email address.';
            return;
          }
          commitAnswer();
        }
      };

      updateProgress();

      if(inputEl){
        setTimeout(() => {
          try{
            inputEl.focus({ preventScroll: true });
            if(inputEl.select) inputEl.select();
          } catch(_){}
        }, 50);
      }
    }

    renderStep();
  });
  </script>

    "description":"A calm, guided form to capture engagement ring preferences, style, and stone choices."

</body>
