<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ring Design Gallery | Ladfox</title>
  <meta name="description" content="Browse Ladfox ring design references, signature settings, and diamond-led directions, with VVS clarity or above typically sourced as standard." />
  <link rel="canonical" href="https://ladfox.com/ring-gallery.html" />
  <link rel="icon" type="image/png" sizes="1024x1024" href="/Images/Logo%20Inverted.png" />
  <link rel="apple-touch-icon" href="/Images/Logo%20Inverted.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#000000" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Ring Design Gallery | Ladfox" />
  <meta property="og:description" content="A sharper Ladfox gallery of ring directions, signature settings, and premium diamond standards." />
  <meta property="og:url" content="https://ladfox.com/ring-gallery.html" />
  <meta property="og:image" content="https://ladfox.com/Images/products/classic-solitaire/classic.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Ring Design Gallery | Ladfox" />
  <meta name="twitter:description" content="Ladfox ring design references with premium setting direction and VVS clarity or above typically sourced as standard." />
  <meta name="twitter:image" content="https://ladfox.com/Images/products/classic-solitaire/classic.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="scroll-reveal.css" />

  <script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@type":"CollectionPage",
    "name":"Ring Design Gallery",
    "url":"https://ladfox.com/ring-gallery.html",
    "description":"Ladfox ring design references presented as a focused gallery.",
    "isPartOf":{
      "@type":"WebSite",
      "name":"Ladfox",
      "url":"https://ladfox.com/"
    }
  }
  </script>

  <style>
    :root{
      --bg:#030303;
      --surface:#0b0b0b;
      --surface-2:#111111;
      --line:rgba(255,255,255,.12);
      --text:#ffffff;
      --muted:rgba(255,255,255,.72);
      --shadow:0 22px 70px rgba(0,0,0,.34);
      --max:1200px;
      --heading:"Syne", sans-serif;
      --body:"Manrope", sans-serif;
    }

    *{ box-sizing:border-box; }

    html{
      background:#030303;
      overscroll-behavior-y:none;
    }

    body{
      margin:0;
      min-height:100dvh;
      color:var(--text);
      font-family:var(--body);
      overflow-x:hidden;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.06), transparent 28%),
        linear-gradient(180deg, #060606 0%, #000000 100%);
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .shell{
      width:min(calc(100% - 32px), var(--max));
      margin:0 auto;
    }

    .topbar{
      padding:8px 0 0;
      position:relative;
      background:transparent;
    }

    .topbar .shell{
      display:grid;
      justify-items:center;
      gap:18px;
    }

    .brand{
      display:inline-flex;
      align-items:center;
      line-height:0;
    }

    .brand img{
      width:min(205px, 44vw);
      height:auto;
      display:block;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .nav a{
      padding:10px 14px;
      border:1px solid var(--line);
      border-radius:999px;
      color:var(--muted);
      font-size:.92rem;
      transition:background .2s ease, color .2s ease, border-color .2s ease;
    }

    .nav a:hover,
    .nav a:focus-visible{
      background:rgba(255,255,255,.04);
      border-color:rgba(255,255,255,.22);
      color:var(--text);
    }

    .hero{
      padding:46px 0 24px;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:18px;
      align-items:stretch;
    }

    .panel,
    .hero-visual,
    .card,
    .note-card,
    .cta{
      border:1px solid var(--line);
      border-radius:30px;
      background:rgba(255,255,255,.04);
      box-shadow:var(--shadow);
    }

    .panel{
      padding:30px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        rgba(255,255,255,.03);
    }

    .eyebrow{
      display:inline-flex;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.04);
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:.72rem;
      font-weight:800;
    }

    h1,h2,h3{
      margin:0;
      font-family:var(--heading);
      line-height:1.04;
    }

    h1{
      margin-top:18px;
      font-size:clamp(2.8rem, 6vw, 5.4rem);
      max-width:10ch;
    }

    .panel p{
      margin:16px 0 0;
      color:var(--muted);
      line-height:1.75;
      max-width:60ch;
    }

    .hero-visual{
      overflow:hidden;
      min-height:420px;
      background:#0a0a0a;
      position:relative;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .hero-visual::after{
      content:none;
    }

    .hero-visual img{
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center;
      display:block;
      border-radius:26px;
      box-shadow:var(--shadow);
    }

    .actions{
      margin-top:24px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:54px;
      padding:0 20px;
      border-radius:18px;
      border:1px solid transparent;
      font-weight:800;
    }

    .btn-primary{
      background:#000;
      color:#fff;
      border-color:#000;
    }

    .btn-secondary{
      background:#000;
      color:#fff;
      border-color:#000;
    }

    .hero-points,
    .proof-strip,
    .standards-grid,
    .detail-list{
      display:grid;
      gap:12px;
    }

    .hero-points{
      margin-top:22px;
      grid-template-columns:repeat(3, minmax(0, 1fr));
    }

    .hero-point,
    .proof-item{
      padding:16px 18px;
      border:1px solid rgba(255,255,255,.1);
      border-radius:22px;
      background:rgba(255,255,255,.03);
    }

    .hero-point strong,
    .proof-item strong{
      display:block;
      font-family:var(--heading);
      font-size:1rem;
      margin-bottom:6px;
    }

    .hero-point p,
    .proof-item p{
      margin:0;
      color:var(--muted);
      line-height:1.65;
      font-size:.95rem;
    }

    .signal-grid,
    .grid{
      display:grid;
      gap:16px;
    }

    .signal-grid{
      grid-template-columns:repeat(3, minmax(0, 1fr));
      margin-top:18px;
    }

    .note-card{
      padding:20px;
      min-height:150px;
    }

    .note-card strong{
      display:block;
      margin-bottom:8px;
      font-size:1.4rem;
      font-family:var(--heading);
    }

    .note-card p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
    }

    .section{
      padding:12px 0 6px;
    }

    .proof-strip{
      grid-template-columns:repeat(4, minmax(0, 1fr));
      margin:4px 0 26px;
    }

    .section-head{
      display:flex;
      align-items:end;
      justify-content:space-between;
      gap:18px;
      margin-bottom:16px;
    }

    .section-head h2{
      font-size:clamp(2rem, 4vw, 3.4rem);
      max-width:none;
      white-space:nowrap;
    }

    .section-head p{
      margin:0;
      max-width:58ch;
      color:var(--muted);
      line-height:1.7;
    }

    .grid{
      grid-template-columns:repeat(3, minmax(0, 1fr));
    }

    .gallery-cta{
      margin-top:48px;
      margin-bottom:140px;
      display:flex;
      justify-content:center;
    }

    .card{
      overflow:hidden;
      display:block;
      background:rgba(255,255,255,.03);
      transition:transform .22s ease, border-color .22s ease, background .22s ease;
    }

    .card-link{
      display:block;
      min-height:100%;
      height:100%;
      position:relative;
      z-index:2;
      cursor:pointer;
    }

    .card:hover,
    .card:focus-within{
      transform:translateY(-4px);
      border-color:rgba(255,255,255,.22);
      background:rgba(255,255,255,.05);
    }

    .card-media{
      position:relative;
      min-height:360px;
      background:#000;
      overflow:hidden;
    }

    .card-media img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center center;
      display:block;
      background:#000;
    }

    .card-media img.is-flipped{
      transform:scaleX(-1);
    }

    .card-media-empty{
      width:100%;
      height:100%;
      background:#000;
    }

    .card-overlay{
      position:relative;
      z-index:2;
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      padding:24px 22px 20px;
      display:grid;
      gap:8px;
      align-content:end;
      background:linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.2) 24%, rgba(0,0,0,.82) 100%);
    }

    .card-overlay h3{
      margin:0;
      color:#ffffff;
      font-size:1.1rem;
      line-height:1.2;
      text-transform:none;
    }

    .card-price{
      margin:0;
      color:var(--muted);
      font-size:.95rem;
      line-height:1.4;
      font-weight:700;
    }

    .meta{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .meta span{
      border:1px solid rgba(255,255,255,.14);
      border-radius:999px;
      padding:7px 10px;
      font-size:.8rem;
      color:var(--muted);
    }

    .card p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
    }

    .standards-grid{
      grid-template-columns:1.05fr .95fr;
      margin-top:8px;
      align-items:stretch;
    }

    .detail-list{
      margin-top:18px;
    }

    .detail-item{
      padding:18px 20px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:22px;
      background:rgba(255,255,255,.03);
    }

    .detail-item strong{
      display:block;
      margin-bottom:6px;
      font-family:var(--heading);
      font-size:1.05rem;
    }

    .detail-item p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
    }

    .text-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-weight:800;
      color:#fff;
      font-size:.88rem;
      width:max-content;
    }

    .text-link::after{
      content:"";
      width:14px;
      height:14px;
      border-top:1.5px solid currentColor;
      border-right:1.5px solid currentColor;
      transform:rotate(45deg) translateY(1px);
    }

    .cta{
      margin:24px 0 40px;
      padding:26px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        rgba(255,255,255,.03);
    }

    .cta p{
      margin:10px 0 0;
      color:var(--muted);
      max-width:58ch;
      line-height:1.7;
    }

    .site-footer{
      padding:26px 0 44px;
      border-top:1px solid rgba(255,255,255,.08);
    }

    .site-footer .shell{
      text-align:center;
    }

    .footer-meta{
      margin:0;
      color:var(--muted);
      font-size:clamp(.76rem, 2.2vw, .94rem);
      line-height:1.65;
    }

    .footer-meta a{
      color:#fff;
      text-decoration:underline;
      text-underline-offset:4px;
    }

    @media (min-width:1021px){
      .topbar{
        padding:6px 0 0;
      }

      main.shell{
        min-height:calc(100dvh - 92px);
        display:flex;
        align-items:center;
      }

      .section{
        width:100%;
        padding:6px 0 0;
      }

      .section-head{
        margin-bottom:12px;
      }

      .section-head h2{
        font-size:clamp(1.8rem, 2.6vw, 2.6rem);
      }

      .grid{
        gap:12px;
      }

      .card{
        display:block;
      }

      .card-link{
        display:block;
      }

      .card-media{
        min-height:290px;
      }

      .card-overlay{
        padding:20px 18px 18px;
      }

      .card-overlay h3{
        font-size:1rem;
      }

      .gallery-cta{
        margin-top:20px;
        margin-bottom:0;
      }

      .btn{
        min-height:48px;
      }
    }

    @media (max-width:1020px){
      .hero-grid,
      .hero-points,
      .proof-strip,
      .signal-grid,
      .grid,
      .standards-grid{
        grid-template-columns:1fr;
      }

      .section-head,
      .cta{
        flex-direction:column;
        align-items:flex-start;
      }

      .nav{
        justify-content:flex-start;
      }
    }

    @media (max-width:720px){
      .shell{
        width:min(calc(100% - 24px), var(--max));
      }

      .brand img{
        width:min(244px, 70vw);
      }

      .section-head h2{
        white-space:normal;
      }

      .card-media{
        min-height:auto;
        aspect-ratio:1 / 1;
      }

      .panel,
      .hero-visual,
      .card,
      .note-card,
      .cta{
        border-radius:24px;
      }

      .panel,
      .note-card,
      .cta{
        padding:22px;
      }
    }
  </style>

</head>
<body>
  <header class="topbar">
    <div class="shell">
      <a class="brand" href="index.html" aria-label="Ladfox home">
        <img src="Images/ladfox-logo.png" alt="Ladfox" />
      </a>
    </div>
  </header>

  <main class="shell">
    <section class="section" aria-labelledby="collection">
      <div class="section-head">
        <div>
          <h2 id="collection">Our signature collection</h2>
        </div>
      </div>

      <div class="grid">
        <article class="card card-soft">
          <a class="card-link" href="classic-solitaire.html" aria-label="View classic solitaire ring details">
            <div class="card-media">
              <img src="Images/products/classic-solitaire/classic.png" alt="Classic solitaire engagement ring" loading="lazy" decoding="async" />
              <div class="card-overlay">
                <h3>Classic solitaire</h3>
                <span class="text-link">View details</span>
              </div>
            </div>
          </a>
        </article>

        <article class="card">
          <a class="card-link" href="trilogy-ring.html" aria-label="View trilogy ring details">
            <div class="card-media">
              <img class="is-flipped" src="Images/products/trilogy-ring/trilogy.png" alt="Trilogy engagement ring design" loading="lazy" decoding="async" />
              <div class="card-overlay">
                <h3>Trilogy</h3>
                <span class="text-link">View details</span>
              </div>
            </div>
          </a>
        </article>

        <article class="card">
          <a class="card-link" href="floral-ring.html" aria-label="View floral ring details">
            <div class="card-media">
              <img src="Images/products/floral-ring/floral.png" alt="Floral engagement ring design" loading="lazy" decoding="async" />
              <div class="card-overlay">
                <h3>Floral</h3>
                <span class="text-link">View details</span>
              </div>
            </div>
          </a>
        </article>

      </div>

      <div class="gallery-cta">
        <a class="btn btn-primary" href="ringpage.html">Create Something Custom</a>
      </div>
    </section>

  </main>

  <footer class="site-footer" aria-label="Legal information">
    <div class="shell">
      <p class="footer-meta">&copy; 2026 LADFOX Ltd Company No. 16416135. All rights reserved. <a href="mailto:info@ladfox.com">info@ladfox.com</a></p>
    </div>
  </footer>
  <script src="scroll-reveal.js"></script>
</body>
</html>
